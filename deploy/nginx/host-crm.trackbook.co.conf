# Host nginx — CRM only (never touches hrms.trackbook.co)
# Proxies to Docker CRM on 127.0.0.1:9080
#
# Installed by: scripts/fix-crm-nginx-vhost.sh

map $http_upgrade $connection_upgrade_crm {
    default upgrade;
    ''      close;
}

upstream amazon_crm_docker {
    server 127.0.0.1:9080;
    keepalive 32;
}

# ----- HTTP :80 -----
server {
    listen 80;
    listen [::]:80;
    server_name crm.trackbook.co www.crm.trackbook.co;

    client_max_body_size 50M;

    location / {
        proxy_pass http://amazon_crm_docker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_crm;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}

# ----- HTTPS :443 (cert paths filled by install script) -----
# __SSL_SERVER_BLOCK__
