# Host nginx (Ubuntu) — keeps HRMS on hrms.trackbook.co untouched.
# CRM Docker listens on 127.0.0.1:9080 only.
#
# Install:
#   sudo cp deploy/nginx/host-crm.trackbook.co.conf /etc/nginx/sites-available/crm.trackbook.co
#   sudo ln -sf /etc/nginx/sites-available/crm.trackbook.co /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# If certbot already manages SSL for this host, use the HTTPS server block below
# or run: sudo certbot --nginx -d crm.trackbook.co

map $http_upgrade $connection_upgrade_crm {
    default upgrade;
    ''      close;
}

upstream amazon_crm_docker {
    server 127.0.0.1:9080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name crm.trackbook.co www.crm.trackbook.co;

    client_max_body_size 50M;

    location / {
        proxy_pass http://amazon_crm_docker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_crm;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}

