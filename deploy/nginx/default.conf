# nginx reverse proxy — single entry for CRM UI + API + WebSockets
# Domain: https://crm.trackbook.co (HTTPS usually terminated at Cloudflare → origin :80)

upstream crm_frontend {
    server frontend:3000;
}

upstream crm_backend {
    server backend:8000;
}

# Prefer Cloudflare / proxy proto so Django USE_HTTPS works
map $http_x_forwarded_proto $crm_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name crm.trackbook.co www.crm.trackbook.co _;
    client_max_body_size 50M;

    # Uploaded documents / media
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django admin / WhiteNoise static (proxied)
    location /static/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $crm_forwarded_proto;
    }

    location /admin/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $crm_forwarded_proto;
    }

    location /api/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $crm_forwarded_proto;
        proxy_read_timeout 120s;
    }

    location /ws/ {
        proxy_pass http://crm_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $crm_forwarded_proto;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://crm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $crm_forwarded_proto;
    }
}
