# Production stack — one command deploy
#   1. Copy .env.prod.example → .env.prod and edit secrets
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   3. Open http://YOUR_HOST/

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crm

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - crm

  backend:
    build:
      context: ./CRM_Backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      USE_POSTGRES: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_ALWAYS_EAGER: "0"
      DEBUG: "False"
      RUN_SEED: ${RUN_SEED:-0}
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - crm

  celery-worker:
    build:
      context: ./CRM_Backend
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    env_file:
      - .env.prod
    environment:
      USE_POSTGRES: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_ALWAYS_EAGER: "0"
      DEBUG: "False"
    volumes:
      - media_data:/app/media
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm

  celery-beat:
    build:
      context: ./CRM_Backend
    restart: unless-stopped
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    env_file:
      - .env.prod
    environment:
      USE_POSTGRES: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CELERY_ALWAYS_EAGER: "0"
      DEBUG: "False"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm

  frontend:
    build:
      context: ./CRM_Frontend
      args:
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_WS_URL: ""
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - crm

volumes:
  pgdata:
  redisdata:
  media_data:

networks:
  crm:
    driver: bridge
