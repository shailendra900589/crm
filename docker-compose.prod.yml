# Production stack — coexists with other apps (e.g. HRMS on :80).
# Host nginx proxies https://crm.trackbook.co → 127.0.0.1:9080
#   See deploy/nginx/host-crm.trackbook.co.conf and scripts/ec2-fix-and-deploy.sh
#
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

name: amazon-crm

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host ports — isolated from HRMS / other DBs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crm

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    # No host ports — isolated Redis for this CRM only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - crm

  backend:
    build:
      context: ./CRM_Backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      USE_POSTGRES: "1"
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_ALWAYS_EAGER: "0"
      DEBUG: "False"
      RUN_SEED: ${RUN_SEED:-0}
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - crm

  celery-worker:
    build:
      context: ./CRM_Backend
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    env_file:
      - .env.prod
    environment:
      USE_POSTGRES: "1"
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_ALWAYS_EAGER: "0"
      DEBUG: "False"
    volumes:
      - media_data:/app/media
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm

  celery-beat:
    build:
      context: ./CRM_Backend
    restart: unless-stopped
    command: ["celery", "-A", "config", "beat", "-l", "info"]
    env_file:
      - .env.prod
    environment:
      USE_POSTGRES: "1"
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_ALWAYS_EAGER: "0"
      DEBUG: "False"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm

  frontend:
    build:
      context: ./CRM_Frontend
      args:
        # Browser calls https://crm.trackbook.co/api (via host nginx → Docker) — never 127.0.0.1
        NEXT_PUBLIC_API_URL: same-origin
        NEXT_PUBLIC_WS_URL: same-origin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # Localhost only — host nginx (HRMS-safe) proxies crm.trackbook.co here
    ports:
      - "127.0.0.1:${HTTP_PORT:-9080}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media:ro
    depends_on:
      - frontend
      - backend
    networks:
      - crm

volumes:
  pgdata:
  redisdata:
  media_data:

networks:
  crm:
    driver: bridge
    name: amazon-crm-net
